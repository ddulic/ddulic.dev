name: Auto Tag Blog Posts

on:
  push:
    branches: [main]
    paths:
      - 'src/content/posts/**.md'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed blog posts
        id: changed-posts
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD -- 'src/content/posts/*.md' | tr '\n' ' ')
          echo "files=$changed" >> $GITHUB_OUTPUT
          echo "Changed posts: $changed"

      - name: Auto-tag blog posts
        if: steps.changed-posts.outputs.files != ''
        uses: anthropics/claude-code-action@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            A blog post was just pushed. The changed file(s): ${{ steps.changed-posts.outputs.files }}

            Your task is to ensure every post's tags are accurate and consistent across the entire blog.

            Rules:
            - A tag may only appear on a post if that same tag also appears on at least one OTHER post in src/content/posts/
            - Tags must be shared across 2 or more posts to be valid
            - Each post may have a maximum of 5 tags
            - Tags should be concise and title-cased (e.g. Terraform, Kubernetes, DevOps, Linux, Productivity)
            - Only modify the `tags:` line in the frontmatter — do not change anything else

            Steps:
            1. Read ALL files in src/content/posts/ to understand the full tag landscape
            2. Build a frequency map of every tag across all posts
            3. For the changed post(s), identify candidate tags from the post content
            4. Only assign a candidate tag if it already exists on at least one other post (frequency >= 2 after adding it)
            5. Update the `tags:` line of the changed post(s) with the valid tags (up to 5)
            6. If any existing tags on other posts now only appear on a single post due to this change, remove them from those posts too to maintain consistency
