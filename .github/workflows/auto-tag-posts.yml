name: Auto Tag and Categorize Blog Posts

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/content/posts/**.md'

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get changed blog posts
        id: changed-posts
        run: |
          changed=$(git diff --name-only origin/main...HEAD -- 'src/content/posts/*.md' | tr '\n' ' ')
          echo "files=$changed" >> $GITHUB_OUTPUT
          echo "Changed posts: $changed"

      - name: Auto-tag blog posts
        if: steps.changed-posts.outputs.files != ''
        uses: anthropics/claude-code-action@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            A new blog post was added in this PR. The changed file(s): ${{ steps.changed-posts.outputs.files }}

            Your task is to ensure every post's tags and category are accurate and consistent across the entire blog.

            Tag rules:
            - A tag may only appear on a post if that same tag also appears on at least one OTHER post in src/content/posts/
            - Tags must be shared across 2 or more posts to be valid
            - Each post may have a maximum of 5 tags
            - Tags should be concise and title-cased (e.g. Terraform, Kubernetes, DevOps, Linux, Productivity)
            - NEVER use generic, vague tags such as: Personal, Setup, General, Misc, Other, Various, Tips, Guide, Tutorial

            Category rules:
            - Set the `category:` field to the single most significant topic of the post
            - The category should be a single concise noun or proper noun (e.g. Terraform, Kubernetes, Productivity, Linux, Gaming, Blogging, Career, CI/CD, AWS)
            - NEVER use generic categories such as: Personal, General, Misc, Other, Various

            Steps:
            1. Read ALL files in src/content/posts/ to understand the full tag landscape
            2. Build a frequency map of every tag across all posts
            3. For the changed post(s), identify candidate tags from the post content
            4. Only assign a candidate tag if it already exists on at least one other post (frequency >= 2 after adding it)
            5. Update the `tags:` line of the changed post(s) with the valid tags (up to 5)
            6. Update the `category:` line of the changed post(s) with the most significant topic
            7. If any existing tags on other posts now only appear on a single post due to this change, remove them from those posts too to maintain consistency
