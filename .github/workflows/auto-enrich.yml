name: Auto Enrich Blog Posts

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/content/posts/**.md'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Get changed blog posts
        id: changed-posts
        run: |
          changed=$(git diff --name-only origin/main...HEAD -- 'src/content/posts/*.md' | tr '\n' ' ')
          echo "files=$changed" >> $GITHUB_OUTPUT
          echo "Changed posts: $changed"

      - name: Check if enrichment needed
        id: needs-enrich
        if: steps.changed-posts.outputs.files != ''
        run: |
          needs=false
          for f in ${{ steps.changed-posts.outputs.files }}; do
            if [ ! -f "$f" ]; then continue; fi
            desc=$(awk '/^---/{p++} p==1 && /^description:/{print}' "$f")
            tags=$(awk '/^---/{p++} p==1 && /^tags:/{print}' "$f")
            cat=$(awk '/^---/{p++} p==1 && /^category:/{print}' "$f")
            # empty if field missing, value is "", [], or whitespace-only after colon
            if [ -z "$desc" ] || echo "$desc" | grep -qE 'description:\s*""?\s*$'; then needs=true; break; fi
            if [ -z "$tags" ] || echo "$tags" | grep -qE 'tags:\s*\[\s*\]\s*$'; then needs=true; break; fi
            if [ -z "$cat" ] || echo "$cat" | grep -qE 'category:\s*""?\s*$'; then needs=true; break; fi
          done
          echo "needed=$needs" >> $GITHUB_OUTPUT
          echo "Enrichment needed: $needs"

      - name: Configure git
        if: steps.needs-enrich.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Auto-enrich blog posts
        if: steps.needs-enrich.outputs.needed == 'true'
        uses: anthropics/claude-code-action@567fe954a4527e81f132d87d1bdbcc94f7737434 # main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          settings: |
            {
              "permissions": {
                "allow": [
                  "Edit",
                  "Write",
                  "Bash(git add:*)",
                  "Bash(git commit:*)",
                  "Bash(git push:*)",
                  "Bash(git diff:*)",
                  "Bash(git log:*)",
                  "Bash(git mv:*)",
                  "Bash(ls:*)"
                ],
                "deny": []
              }
            }
          prompt: |
            A new blog post was added in this PR. The changed file(s): ${{ steps.changed-posts.outputs.files }}

            Your task is to ensure every post's tags, category, description are accurate and consistent, and that all images have SEO-friendly filenames.

            Description rules:
            - The `description:` field must be a single sentence summarising the post content
            - Length must be between 110 and 160 characters (inclusive)
            - Write it in an active, informative style — describe what the post covers or teaches
            - NEVER leave the description empty or use a placeholder value
            - Only update the description if it is empty ("") or clearly a placeholder

            Tag rules:
            - A tag may only appear on a post if that same tag also appears on at least one OTHER post in src/content/posts/
            - Tags must be shared across 2 or more posts to be valid
            - Each post may have a maximum of 5 tags
            - Tags should be concise and title-cased (e.g. Terraform, Kubernetes, DevOps, Linux, Productivity)
            - NEVER use generic, vague tags such as: Personal, Setup, General, Misc, Other, Various, Tips, Guide, Tutorial

            Category rules:
            - Set the `category:` field to the single most significant topic of the post
            - The category should be a single concise noun or proper noun (e.g. Terraform, Kubernetes, Productivity, Linux, Gaming, Blogging, Career, CI/CD, AWS)
            - NEVER use generic categories such as: Personal, General, Misc, Other, Various

            Image SEO rules:
            - A non-SEO-friendly filename is any of: random hash (e.g. hG4xpm85JuI6ZdjFi.png), UUID (e.g. DD591F5C-9F96-48C7-A580-E832B4465153.png), screenshot timestamp (e.g. Screenshot_2021-04-26_at_16.48.17.png), generic name (e.g. Untitled.png, Untitled 1.png), or camera roll name (e.g. IMG_0945.png)
            - SEO-friendly names must be lowercase, hyphen-separated, descriptive of the image content, and keep the original file extension (e.g. kubernetes-node-architecture.png)
            - Derive the new name from the surrounding text/context in the markdown (headings, captions, paragraph content near the image reference)
            - If multiple images exist in the same folder, ensure each gets a unique name
            - Do NOT rename images that already have SEO-friendly names

            Steps:
            1. Read ALL files in src/content/posts/ to understand the full tag landscape and existing descriptions
            2. Build a frequency map of every tag across all posts
            3. For the changed post(s), read the full content
            4. If the description is empty or a placeholder, generate a new one (110-160 chars) based on the post content
            5. Identify candidate tags from the post content
            6. Only assign a candidate tag if it already exists on at least one other post (frequency >= 2 after adding it)
            7. Update the `description:` field of the changed post(s) if needed
            8. Update the `tags:` line of the changed post(s) with the valid tags (up to 5)
            9. Update the `category:` line of the changed post(s) with the most significant topic
            10. If any existing tags on other posts now only appear on a single post due to this change, remove them from those posts too to maintain consistency
            11. For each changed post, list all local image references (paths starting with ../../assets/images/)
            12. For each image with a non-SEO-friendly filename, derive a descriptive SEO-friendly name from surrounding context
            13. Rename the image file using `git mv <old-path> <new-path>`
            14. Update every occurrence of the old image path in the markdown file with the new path
            15. Stage all modified files with `git add`
            16. Commit with message "auto-enrich: update tags, category, description, and image names for [filename]"
            17. Push to the current branch with `git push`
